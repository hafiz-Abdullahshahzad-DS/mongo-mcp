# fly.toml app configuration file generated for mongo-mcp-replace-me on 2026-05-11T19:00:19+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mongo-mcp-replace-me'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
